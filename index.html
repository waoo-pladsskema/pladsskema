<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waoo Kundecenter – Fremmøde</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f2f3f5;
  --surface: #fff;
  --border: #dde0e6;
  --text: #111214;
  --text-muted: #6b7280;
  --accent: #e84b0a;
  --accent-dark: #c43d07;
  --accent-light: #fff0eb;
  --navy: #2121e8;
  --navy2: #1818c4;
  --radius: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --t0: #e84b0a; --t0l: #fff0eb;
  --t1: #2121e8; --t1l: #e0e0fc;
  --t2: #0073b6; --t2l: #dceef9;
  --t3: #00a86b; --t3l: #d6f5e9;
  --t4: #7b2d8b; --t4l: #f0e0f5;
  --t5: #c43d07; --t5l: #ffe5d9;
  --t6: #0e7490; --t6l: #cffafe;
  --t7: #b45309; --t7l: #fef3c7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── LOGIN ── */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1010a0 0%,#2121e8 55%,#e84b0a 100%)}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,.3);text-align:center}
.login-card h1{font-size:20px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.login-card>p{color:var(--text-muted);margin-bottom:28px;font-size:13px}
.ms-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:20px}
.ms-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.ms-icon{width:22px;height:22px}
.demo-select{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;background:var(--bg);cursor:pointer;margin-bottom:10px}
.demo-label{font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block}

/* ── LAYOUT ── */
#app{display:none;flex-direction:column;min-height:100vh}

/* ── TOPNAV ── */
.topnav{background:linear-gradient(110deg,#d32400 0%,#b84020 40%,#c03010 60%,#d32400 100%);color:#fff;padding:0 24px;height:90px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid rgba(0,0,0,.15)}
.nav-left{display:flex;align-items:center;gap:14px}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo img{height:72px;width:auto}
.nav-logo-text{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.08em;text-transform:uppercase;border-left:2px solid rgba(255,255,255,.4);padding-left:16px;font-style:italic}
.nav-right{display:flex;align-items:center;gap:10px}
.user-chip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);padding:7px 16px 7px 7px;border-radius:999px;font-size:15px;font-weight:600;color:#fff}
.user-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.nav-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);color:#fff;padding:10px 20px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff}
.nav-btn.admin-btn{background:rgba(232,75,10,.25);border-color:rgba(232,75,10,.5);color:#ffb599}
.nav-btn.admin-btn:hover{background:rgba(232,75,10,.45);color:#fff}
.nav-tab-bar{display:flex;gap:4px}
.nav-tab{background:none;border:none;color:rgba(255,255,255,.6);padding:6px 14px;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-tab.active{color:#fff;background:rgba(232,75,10,.3);border-bottom:2px solid var(--accent)}

/* ── WEEK NAV ── */
.week-nav{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.week-controls{display:flex;align-items:center;gap:10px}
.week-label{font-size:16px;font-weight:700;min-width:110px;text-align:center}
.week-sub{font-size:11px;color:var(--text-muted);text-align:center}
.icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.today-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.legend{display:flex;flex-wrap:wrap;gap:7px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:5px 12px;border-radius:999px}

/* ── MAIN ── */
.main{padding:16px 20px;flex:1;overflow-x:auto}

/* ── ROOM BLOCK ── */
.room-block{margin-bottom:20px}
.room-header{display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--radius) var(--radius) 0 0;border-left:4px solid var(--accent)}
.room-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.room-cap{font-size:12px;color:rgba(255,255,255,.6)}

/* ── CAL GRID ── */
.cal-grid{background:#fff;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;min-width:640px}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid var(--border)}
.cal-head-cell{padding:7px 5px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border-right:1px solid var(--border)}
.cal-head-cell:last-child{border-right:none}
.cal-head-cell.today-col{background:var(--accent-light);color:var(--accent)}
.cal-head-cell .day-num{font-size:17px;font-weight:800;color:var(--text);display:block;line-height:1.1}
.cal-head-cell.today-col .day-num{color:var(--accent)}
.cal-head-cell.weekend{background:#fafafa}
.cal-head-cell.weekend .day-num{color:var(--text-muted)}
.cal-rows{}
.cal-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);min-height:36px}
.cal-row:last-child{border-bottom:none}
.cal-cell{border-right:1px solid var(--border);padding:3px;display:flex;flex-direction:column;gap:2px;min-height:36px}
.cal-cell:last-child{border-right:none}
.cal-cell.today-col{background:#fafcff}
.cal-cell.weekend{background:#f7f8fb}

/* ── BOOKING CHIPS ── */
.booking-chip{display:flex;flex-direction:column;padding:3px 6px 3px 6px;border-radius:5px;font-size:11px;font-weight:600;line-height:1.3;position:relative}
.chip-row1{display:flex;align-items:center;gap:3px;padding-right:18px}
.chip-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chip-initials{font-size:10px;opacity:.7;flex-shrink:0}
.chip-time{font-size:9px;opacity:.75;font-weight:500}
.chip-remove{position:absolute;right:3px;top:3px;background:rgba(0,0,0,.18);border:none;border-radius:3px;width:14px;height:14px;font-size:9px;cursor:pointer;display:none;align-items:center;justify-content:center;color:inherit;line-height:1;padding:0}
.booking-chip:hover .chip-remove{display:flex}
.booking-chip.mine{outline:2px solid currentColor;outline-offset:-2px}
.add-slot{display:flex;align-items:center;justify-content:center;border:1.5px dashed var(--border);border-radius:5px;color:var(--text-muted);font-size:18px;height:28px;cursor:pointer;transition:all .15s}
.add-slot:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* ── CAPACITY BAR ── */
.cap-row{display:grid;grid-template-columns:repeat(7,1fr);background:#f8fafc;border-top:2px solid var(--border)}
.cap-cell{border-right:1px solid var(--border);padding:5px 6px}
.cap-cell:last-child{border-right:none}
.cap-bar-bg{height:5px;border-radius:999px;background:var(--border);overflow:hidden;margin-bottom:3px}
.cap-bar-fill{height:100%;border-radius:999px;transition:width .3s}
.cap-text{font-size:10px;font-weight:600;text-align:center;color:var(--text-muted)}
.cap-full .cap-bar-fill{background:#dc2626}
.cap-ok .cap-bar-fill{background:#16a34a}
.cap-warn .cap-bar-fill{background:#f59e0b}

/* ── HISTORY VIEW ── */
.history-view{padding:0}
.hist-controls{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hist-controls label{font-size:13px;font-weight:600;color:var(--text-muted)}
.hist-controls select{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer}
.hist-controls select:focus{outline:none;border-color:var(--accent)}
.hist-body{padding:16px 20px;overflow-x:auto}
.hist-table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.hist-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.hist-table th:first-child{border-radius:8px 0 0 0}
.hist-table th:last-child{border-radius:0 8px 0 0}
.hist-table td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:#f8f9fb}
.week-cell{text-align:center;padding:5px 4px;border-radius:6px;font-weight:700;font-size:13px;cursor:default;position:relative;min-width:44px}
.week-cell.green{background:#d1fae5;color:#065f46}
.week-cell.yellow{background:#fef9c3;color:#92400e}
.week-cell.red{background:#fee2e2;color:#991b1b}
.week-cell.empty{background:#f3f4f6;color:#9ca3af;font-weight:400}
.week-tooltip{display:none;position:fixed;background:#111;color:#fff;font-size:11px;font-weight:500;padding:7px 11px;border-radius:7px;white-space:nowrap;z-index:9999;pointer-events:none;min-width:130px;text-align:left;line-height:1.8;box-shadow:0 4px 16px rgba(0,0,0,.35)}
.week-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#111}
.hist-avg{display:inline-flex;align-items:center;justify-content:center;width:32px;height:24px;border-radius:6px;font-weight:800;font-size:13px}
.hist-avg.green{background:#d1fae5;color:#065f46}
.hist-avg.yellow{background:#fef9c3;color:#92400e}
.hist-avg.red{background:#fee2e2;color:#991b1b}
.member-name-cell{font-weight:600;white-space:nowrap}
.team-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:6px;vertical-align:middle}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:440px;box-shadow:var(--shadow);overflow:hidden}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:17px;font-weight:800}
.modal-head p{font-size:13px;color:var(--text-muted);margin-top:2px}
.modal-body{padding:18px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block}
.form-select,.form-input{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;background:#fff;transition:border-color .15s;margin-bottom:12px}
.form-select:focus,.form-input:focus{outline:none;border-color:var(--accent)}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.time-row .form-select{margin-bottom:0}
.btn{padding:9px 18px;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}

/* ── ADMIN PANEL ── */
#adminPanel{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(2px)}
#adminPanel.open{display:flex}
.admin-drawer{background:#fff;width:95vw;max-width:900px;min-height:100vh;box-shadow:-8px 0 40px rgba(0,0,0,.15);overflow-y:auto}
.admin-head{background:var(--navy);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--accent)}
.admin-head h2{font-size:17px;font-weight:800}
.admin-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
.admin-body{padding:22px}
.admin-section{margin-bottom:26px}
.admin-section h3{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted)}
.team-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px}
.team-swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.team-row-left{display:flex;align-items:center;gap:8px;flex:1}
.team-name-disp{font-size:14px;font-weight:600}
.small-btn{padding:4px 10px;font-size:12px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit}
.small-btn:hover{background:var(--bg)}
.small-btn.danger:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.member-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;margin:3px}
.member-pill button{background:none;border:none;cursor:pointer;font-size:11px;opacity:.6}
.member-pill button:hover{opacity:1}
.add-member-row{display:flex;gap:8px;margin-top:10px}
.add-member-row input{flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px}
.add-member-row input:focus{outline:none;border-color:var(--accent)}
.add-member-row button{padding:8px 14px;border-radius:8px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:700}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0f172a;color:#fff;padding:11px 22px;border-radius:999px;font-size:14px;font-weight:500;z-index:500;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:#15803d}
.toast.error{background:#dc2626}

/* ── CATEGORY HEADER ── */
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 0 6px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted)}
.cat-header::after{content:'';flex:1;height:1px;background:var(--border)}

@media(max-width:640px){
  .main{padding:10px}
  .week-nav{padding:10px}
  .legend{display:none}
  .topnav{padding:0 12px;height:72px}
  .chip-initials,.chip-time{display:none}
  .nav-tab-bar{display:none}
}
</style>

async function getMsalInstance() {

async function getAccessToken() {

  try {
    const result = await instance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });

async function msLogin() {

async function loadMsUser(account, token) {

    const resp = await fetch('https://graph.microsoft.com/v1.0/me?$select=id,displayName,mail,userPrincipalName,department,jobTitle', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const profile = await resp.json();

    // Try to match with a known team based on department or find in teams list
    const displayName = profile.displayName || account.name;
    const userId = profile.id;
    const email = profile.mail || profile.userPrincipalName;

    // Check if user exists in teams configuration
    let matchedTeam = null;
    let isLeader = false;
    let matchedUserId = userId;

    // Try to find by name match in demo teams (for transition period)

        isLeader = true;
        break;
      }
      if(team.members.some(m => displayName.toLowerCase().includes(m.split(' ')[0].toLowerCase()))) {
        matchedTeam = team;
        isLeader = false;
        break;
      }
    }

    currentUser = {

      teamId: matchedTeam ? matchedTeam.id : teams[0].id,

}

// ═══════════════════════
// SHAREPOINT DATA LAYER
// ═══════════════════════
async function spRequest(method, path, body) {
  const token = msAccessToken || await getAccessToken();
  if(!token) throw new Error('Ikke logget ind');
  const opts = {
    method,
    headers: {
      Authorization: 'Bearer ' + token,
      'Content-Type': 'application/json',
      Accept: 'application/json'
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const resp = await fetch('https://graph.microsoft.com/v1.0' + path, opts);
  if(!resp.ok) {
    const err = await resp.text();
    throw new Error(resp.status + ': ' + err);
  }
  if(resp.status === 204) return null;
  return resp.json();
}

async function getSiteId() {
  if(spSiteId) return spSiteId;
  const data = await spRequest('GET', '/sites/fibia.sharepoint.com:/');
  spSiteId = data.id;
  return spSiteId;
}

async function getListItems(listName, filter) {
  const siteId = await getSiteId();
  let url = `/sites/${siteId}/lists/${listName}/items?expand=fields&$top=999`;
  if(filter) url += '&$filter=' + encodeURIComponent(filter);
  const data = await spRequest('GET', url);
  return data.value || [];
}

async function createListItem(listName, fields) {
  const siteId = await getSiteId();
  return spRequest('POST', `/sites/${siteId}/lists/${listName}/items`, { fields });
}

async function updateListItem(listName, itemId, fields) {
  const siteId = await getSiteId();
  return spRequest('PATCH', `/sites/${siteId}/lists/${listName}/items/${itemId}/fields`, fields);
}

async function deleteListItem(listName, itemId) {
  const siteId = await getSiteId();
  return spRequest('DELETE', `/sites/${siteId}/lists/${listName}/items/${itemId}`);
}

async function loadAllFromSharePoint(token) {
  msAccessToken = token || await getAccessToken();
  const today = new Date(); today.setHours(0,0,0,0);
  const sixWeeksAgo = new Date(today); sixWeeksAgo.setDate(sixWeeksAgo.getDate()-42);
  const sixWeeksLater = new Date(today); sixWeeksLater.setDate(sixWeeksLater.getDate()+42);
  const fromStr = dateStr(sixWeeksAgo);
  const toStr = dateStr(sixWeeksLater);

  try {
    // Load bookings
    const bkItems = await getListItems('Bookinger', `fields/DateStr ge '${fromStr}' and fields/DateStr le '${toStr}'`);
    bookings = {};
    bkItems.forEach(item => {
      const f = item.fields;
      const ds = f.DateStr, roomId = f.RoomId;
      if(!bookings[ds]) bookings[ds] = {};
      if(!bookings[ds][roomId]) bookings[ds][roomId] = [];
      bookings[ds][roomId].push({
        name: f.UserName, userId: f.UserId, teamId: f.TeamId,
        start: f.Start, end: f.End, note: f.Note || '',
        _spId: item.id
      });
    });

    // Load frokost bookings - just today
    const todayStr = dateStr(today);
    const fbItems = await getListItems('FrokostBookinger', `fields/DateStr eq '${todayStr}'`);
    lunchBookings = {};
    fbItems.forEach(item => {
      const f = item.fields;
      if(!lunchBookings[f.DateStr]) lunchBookings[f.DateStr] = {};
      if(!lunchBookings[f.DateStr][f.Section]) lunchBookings[f.DateStr][f.Section] = {};
      if(!lunchBookings[f.DateStr][f.Section][f.SlotId]) lunchBookings[f.DateStr][f.Section][f.SlotId] = [];
      lunchBookings[f.DateStr][f.Section][f.SlotId].push(f.UserId);
      // Store SP id for deletion
      if(!lunchBookings[f.DateStr][f.Section]._spIds) lunchBookings[f.DateStr][f.Section]._spIds = {};
      lunchBookings[f.DateStr][f.Section]._spIds[f.SlotId + '_' + f.UserId] = item.id;
    });

    // Load frokost config for today
    const cfgItems = await getListItems('FrokostKonfig', `fields/DateStr eq '${todayStr}'`);
    cfgItems.forEach(item => {
      const f = item.fields;
      try {
        const cfg = JSON.parse(f.ConfigJson);
        if(!lunchDayOverride[f.DateStr]) lunchDayOverride[f.DateStr] = {};
        lunchDayOverride[f.DateStr][f.Section] = cfg;
        if(!lunchDayOverride[f.DateStr][f.Section]._spId)
          lunchDayOverride[f.DateStr][f.Section]._spId = item.id;
      } catch(e) {}
    });
  } catch(e) {
    showToast('Advarsel: Kunne ikke hente data fra SharePoint: ' + e.message, 'error');
  }
}

async function spSaveLunchConfig(ds, section, cfg) {
  if(!currentUser?.isMsUser) return;
  try {
    const existingId = lunchDayOverride[ds]?.[section]?._spId;
    const cfgCopy = {...cfg}; delete cfgCopy._spId;
    if(existingId) {
      await updateListItem('FrokostKonfig', existingId, { ConfigJson: JSON.stringify(cfgCopy) });
    } else {
      const item = await createListItem('FrokostKonfig', {
        Title: section + '_' + ds, DateStr: ds, Section: section, ConfigJson: JSON.stringify(cfgCopy)
      });
      if(!lunchDayOverride[ds]) lunchDayOverride[ds] = {};
      if(!lunchDayOverride[ds][section]) lunchDayOverride[ds][section] = cfg;
      lunchDayOverride[ds][section]._spId = item.id;
    }
  } catch(e) { showToast('Kunne ikke gemme konfiguration: ' + e.message, 'error'); }
}

function buildTimeOptions() {
  const times = [];
  for (let h = 7; h <= 21; h++) {
    times.push(`${String(h).padStart(2,'0')}:00`);
    if (h < 21) times.push(`${String(h).padStart(2,'0')}:30`);
  }
  return times;
}
const TIME_OPTIONS = buildTimeOptions();

function populateTimeSelects() {
  const startSel = document.getElementById('shiftStart');
  const endSel = document.getElementById('shiftEnd');
  startSel.innerHTML = '';
  endSel.innerHTML = '';
  TIME_OPTIONS.forEach(t => {
    startSel.innerHTML += `<option value="${t}" ${t==='08:00'?'selected':''}>${t}</option>`;
    endSel.innerHTML   += `<option value="${t}" ${t==='16:00'?'selected':''}>${t}</option>`;
  });
  startSel.addEventListener('change', () => {
    // Auto-advance end if needed
    const si = TIME_OPTIONS.indexOf(startSel.value);
    const ei = TIME_OPTIONS.indexOf(endSel.value);
    if (ei <= si) endSel.value = TIME_OPTIONS[Math.min(si+8, TIME_OPTIONS.length-1)];
  });
}

// ═══════════════════════
// WEEK NAV
// ═══════════════════════
function getMonday(date) {
  const d=new Date(date); const day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day)); d.setHours(0,0,0,0); return d;
}
function goToday() { currentWeekStart=getMonday(new Date()); renderCalendar(); }
function changeWeek(delta) {
  const limit=new Date(); limit.setDate(limit.getDate()+42);
  const proposed=new Date(currentWeekStart); proposed.setDate(proposed.getDate()+delta*7);
  if(proposed>limit) { showToast('Maks 6 uger frem','error'); return; }
  currentWeekStart=proposed; renderCalendar();
}
function getWeekNumber(date) {
  const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  d.setUTCDate(d.getUTCDate()+4-(d.getUTCDay()||7));
  return Math.ceil((((d-new Date(Date.UTC(d.getUTCFullYear(),0,1)))/86400000)+1)/7);
}
function fmtDate(d) { return d.toLocaleDateString('da-DK',{day:'numeric',month:'short'}); }
function dateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseDate(ds){const[y,m,dd]=ds.split('-').map(Number);return new Date(y,m-1,dd);}

function renderCalendar() {
  const weekDays=[];
  for(let i=0;i<7;i++){const d=new Date(currentWeekStart);d.setDate(d.getDate()+i);weekDays.push(d);}
  const weekNum=getWeekNumber(currentWeekStart);
  document.getElementById('weekLabel').textContent=`Uge ${weekNum}`;
  document.getElementById('weekSub').textContent=`${fmtDate(currentWeekStart)} – ${fmtDate(weekDays[6])}`;
  const today=new Date(); today.setHours(0,0,0,0);
  const DAY=['Man','Tirs','Ons','Tors','Fre','Lør','Søn'];
  const main=document.getElementById('mainContent');
  main.innerHTML='';

  ROOMS.forEach(room => {
    const block=document.createElement('div'); block.className='room-block';
    const rh=document.createElement('div'); rh.className='room-header';
    rh.innerHTML=`<div class="room-title"><span>${room.icon}</span>${room.name}</div><div class="room-cap">${room.capacity} pladser</div>`;
    block.appendChild(rh);
    const grid=document.createElement('div'); grid.className='cal-grid';

    // Head
    const head=document.createElement('div'); head.className='cal-head';
    weekDays.forEach((d,i)=>{
      const isToday=d.getTime()===today.getTime(), isWknd=i>=5;
      const cell=document.createElement('div');
      cell.className='cal-head-cell'+(isToday?' today-col':'')+(isWknd?' weekend':'');
      const wkndBadge=isWknd?'<span style="display:block;font-size:9px;color:#9ca3af;font-weight:600;letter-spacing:.03em">Weekend</span>':'';
      cell.innerHTML=`${DAY[i]}<span class="day-num">${d.getDate()}</span>${wkndBadge}`;
      head.appendChild(cell);
    });
    grid.appendChild(head);

    // Rows
    const rows=document.createElement('div'); rows.className='cal-rows';
    const dayCounts=weekDays.map(d=>(bookings[dateStr(d)]?.[room.id]||[]).length);
    const maxBooked=Math.max(...dayCounts,0);
    const rowCount=Math.min(Math.max(maxBooked+2,3),room.capacity);
    for(let row=0;row<rowCount;row++){
      const tr=document.createElement('div'); tr.className='cal-row';
      weekDays.forEach((d,di)=>{
        const ds=dateStr(d), isToday=d.getTime()===today.getTime(), isWknd=di>=5;
        const futureLimit=new Date(today); futureLimit.setDate(futureLimit.getDate()+42);
        const isPast=d<today, isTooFar=d>futureLimit;
        const dayBk = (bookings[ds]?.[room.id]||[]).slice().sort((a,b)=>{
          // 1. Sort by start time ascending
          if(a.start !== b.start) return a.start < b.start ? -1 : 1;
          // 2. Then by team so same-team members cluster together
          if(a.teamId !== b.teamId) return (a.teamId||'').localeCompare(b.teamId||'');
          return 0;
        });
        const isFull=dayBk.length>=room.capacity;
        const cell=document.createElement('div');
        cell.className='cal-cell'+(isToday?' today-col':'')+(isWknd?' weekend':'');
        // Row 0: show add-slot at top if eligible (no booking yet this day for user)
        const alreadyBooked=dayBk.some(b=>b.userId===currentUser.id)||(bookings[ds]?.no_plads||[]).some(b=>b.userId===currentUser.id);
        const showAdd=!isPast&&!isTooFar&&!alreadyBooked; // isFull removed: no_plads is always available
        // Existing bookings are offset by 1 row when add-slot is shown
        const bkIndex = showAdd ? row - 1 : row;
        const bk = bkIndex >= 0 ? dayBk[bkIndex] : null;

        // No-plads chips: shown in first room column, row 0 onwards
        const noPladsBk = (bookings[ds]?.no_plads||[]);
        const isFirstRoom = room.id === ROOMS[0].id;
        const myNoPlads = noPladsBk.find(b=>b.userId===currentUser.id);
        if(isFirstRoom && row < noPladsBk.length) {
          const npb = noPladsBk[row];
          const team=teams.find(t=>t.id===npb.teamId);
          const col=team?TEAM_COLORS[team.colorIdx]:{bg:'#e5e7eb',text:'#374151'};
          const isMe=npb.userId===currentUser.id;
          const chip=document.createElement('div');
          chip.className='booking-chip'+(isMe?' mine':'');
          chip.style.cssText=`background:${col.bg};color:${col.text};border:2px dashed ${col.text}44;opacity:.9`;
          chip.title = npb.note ? npb.note : 'Fysisk fremmøde uden plads';
          const nameEl=document.createElement('span'); nameEl.className='chip-name';
          nameEl.textContent=npb.name.split(' ').map((w,i)=>i===0?w:w[0]+'.').join(' ')+'  🚶';
          chip.appendChild(nameEl);
          if(npb.start&&npb.end){const t=document.createElement('span');t.className='chip-time';t.textContent=npb.start+'–'+npb.end;chip.appendChild(t);}
          if(isMe){
            const rm=document.createElement('button'); rm.className='chip-remove'; rm.textContent='✕';
            rm.onclick=(e)=>{e.stopPropagation();bookings[ds].no_plads=bookings[ds].no_plads.filter(b=>b.userId!==currentUser.id);renderCalendar();showToast('Registrering fjernet','info');};
            chip.appendChild(rm);
          }
          cell.appendChild(chip);
        } else if(row===0 && showAdd){
          const add=document.createElement('div'); add.className='add-slot'; add.textContent='+';
          add.onclick=()=>openBookingModal(ds,room.id);
          cell.appendChild(add);
        } else if(bk){
          const team=teams.find(t=>t.id===bk.teamId);
          const col=team?TEAM_COLORS[team.colorIdx]:{bg:'#e5e7eb',text:'#374151'};
          const isMe=bk.userId===currentUser.id;
          const chip=document.createElement('div');
          chip.className='booking-chip'+(isMe?' mine':'');
          chip.style.background=col.bg; chip.style.color=col.text;
          const isLeaderBk=teams.some(t=>t.leaders&&t.leaders.includes(bk.userId));
          const shortBase=bk.name.split(' ').map((w,i)=>i===0?w:w[0]+'.').join(' ');
          const short=isLeaderBk?'(Leder) '+shortBase:shortBase;
          const inits=bk.name.split(' ').map(w=>w[0]).join('').substring(0,2);
          const timeStr=bk.start&&bk.end?`${bk.start}–${bk.end}`:'';
          chip.innerHTML=`<div class="chip-row1"><span class="chip-name">${short}</span><span class="chip-initials">(${inits})</span></div>${timeStr?`<span class="chip-time">${timeStr}</span>`:''}`;
          if(isMe&&!isPast&&!isTooFar){
            const rm=document.createElement('button'); rm.className='chip-remove'; rm.textContent='✕';
            rm.title='Fjern booking';
            rm.onclick=e=>{e.stopPropagation();removeBooking(ds,room.id,bk);};
            chip.appendChild(rm);
          }
          cell.appendChild(chip);
        }
        tr.appendChild(cell);
      });
      rows.appendChild(tr);
    }
    grid.appendChild(rows);

    // Cap bar
    const capRow=document.createElement('div'); capRow.className='cap-row';
    weekDays.forEach((d,di)=>{
      const ds=dateStr(d), count=(bookings[ds]?.[room.id]||[]).length;
      const pct=Math.round(count/room.capacity*100);
      const cls=pct>=100?'cap-full':pct>=80?'cap-warn':'cap-ok';
      const cell=document.createElement('div'); cell.className=`cap-cell ${cls}`;
      cell.innerHTML=`<div class="cap-bar-bg"><div class="cap-bar-fill" style="width:${pct}%"></div></div><div class="cap-text">${count}/${room.capacity}</div>`;
      capRow.appendChild(cell);
    });
    grid.appendChild(capRow);
    block.appendChild(grid);
    main.appendChild(block);
  });
}

function getUserCurrentBooking(ds) {
  // Check no_plads first
  const noP=(bookings[ds]?.no_plads||[]).find(b=>b.userId===currentUser.id);
  if(noP) return {room:{id:'no_plads',name:'Fysisk fremmøde uden plads'},booking:noP};
  for(const room of ROOMS){
    const found=(bookings[ds]?.[room.id]||[]).find(b=>b.userId===currentUser.id);
    if(found) return {room,booking:found};
  }
  return null;
}

function onModalRoomChange() {
  const val = document.getElementById('modalRoom').value;
  const isNoPlads = val === 'no_plads';
  document.getElementById('noteFieldWrap').style.display = isNoPlads ? '' : 'none';
}

function openBookingModal(ds,roomId) {
  const existing=getUserCurrentBooking(ds);
  if(existing){showToast(`Du har allerede booket plads i ${existing.room.name} denne dag`,'error');return;}
  const d=parseDate(ds);
  modalTarget={ds,roomId};
  document.getElementById('modalDateLabel').textContent=d.toLocaleDateString('da-DK',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('modalUserName').textContent=currentUser.name;
  const sel=document.getElementById('modalRoom'); sel.innerHTML='';
  ROOMS.forEach(r=>{
    const cnt=(bookings[ds]?.[r.id]||[]).length, avail=r.capacity-cnt;
    const opt=document.createElement('option'); opt.value=r.id;
    opt.textContent=`${r.icon} ${r.name} (${avail} ledige)`; opt.selected=r.id===roomId;
    if(avail<=0){opt.disabled=true;opt.textContent+=' – FULD';}
    sel.appendChild(opt);
  });
  // Add "Fysisk fremmøde uden plads" option
  const noPlaOpt = document.createElement('option'); noPlaOpt.value='no_plads';
  noPlaOpt.textContent = '🚶 Fysisk fremmøde uden plads';
  sel.appendChild(noPlaOpt);
  // Reset note field
  document.getElementById('noPladsNote').value = '';
  document.getElementById('noteFieldWrap').style.display = 'none';
  // Reset time to defaults – weekends use 10:00-17:00
  const bookDay=parseDate(ds).getDay();
  const isWeekend=(bookDay===0||bookDay===6);
  document.getElementById('shiftStart').value=isWeekend?'10:00':'08:00';
  document.getElementById('shiftEnd').value=isWeekend?'17:00':'16:00';
  document.getElementById('bookingModal').classList.add('open');
}

function closeModal(){document.getElementById('bookingModal').classList.remove('open');}

function getUserWeekBookings(ds) {
  // Returns all bookings for current user in the same Mon-Fri week as ds
  const d = parseDate(ds);
  const dayOfWeek = d.getDay(); // 0=sun,6=sat
  // Only applies Mon-Fri
  if(dayOfWeek===0||dayOfWeek===6) return [];
  const mon = getMonday(d);
  const result = [];
  for(let i=0;i<5;i++){
    const wd = new Date(mon); wd.setDate(wd.getDate()+i);
    const wds = dateStr(wd);
    if(wds===ds) continue; // skip the day we're booking
    for(const room of ROOMS){
      const found=(bookings[wds]?.[room.id]||[]).find(b=>b.userId===currentUser.id);
      if(found) result.push({ds:wds, roomId:room.id, roomName:room.name});
    }
  }
  return result;
}

function confirmBooking() {
  const roomId=document.getElementById('modalRoom').value;
  const ds=modalTarget.ds;
  const start=document.getElementById('shiftStart').value;
  const end=document.getElementById('shiftEnd').value;

  // Handle "Fysisk fremmøde uden plads"
  if(roomId === 'no_plads') {
    const existing=getUserCurrentBooking(ds);
    if(existing){showToast('Du har allerede en registrering denne dag','error');closeModal();return;}
    const note=document.getElementById('noPladsNote').value.trim();
    if(!bookings[ds]) bookings[ds]={};
    if(!bookings[ds]['no_plads']) bookings[ds]['no_plads']=[];
    bookings[ds]['no_plads'].push({name:currentUser.name,teamId:currentUser.teamId,userId:currentUser.id,start,end,note});
    closeModal();
    showToast('✓ Fysisk fremmøde registreret','success');
    renderCalendar();
    return;
  }

  if(start>=end){showToast('Sluttid skal være efter starttid','error');return;}
  const existing=getUserCurrentBooking(ds);
  if(existing){showToast('Du har allerede en booking denne dag','error');closeModal();return;}
  const room=ROOMS.find(r=>r.id===roomId);
  if((bookings[ds]?.[room.id]||[]).length>=room.capacity){showToast('Lokalet er desværre fuldt','error');closeModal();return;}

  // ── Lokale-regel: 2. booking i samme uge skal være i andet lokale ──
  const d = parseDate(ds);
  const dow = d.getDay();
  if(dow>=1 && dow<=5){ // kun hverdage
    const weekBks = getUserWeekBookings(ds);
    if(weekBks.length >= 1){
      // Bruger har allerede 1+ booking denne uge – tjek om de alle er i samme lokale
      const allSameRoom = weekBks.every(b=>b.roomId===roomId);
      const hasOtherRoom = weekBks.some(b=>b.roomId!==roomId);
      if(allSameRoom && !hasOtherRoom){
        // Alle hidtidige bookinger er i dette lokale – 2. booking skal være i andet lokale
        const otherRooms = ROOMS.filter(r=>r.id!==roomId).map(r=>r.name).join(' eller ');
        showToast(`Din 2. ugentlige booking skal være i et andet lokale (${otherRooms})`, 'error');
        return;
      }
    }
  }
  if(!bookings[ds]) bookings[ds]={};
  if(!bookings[ds][roomId]) bookings[ds][roomId]=[];
  bookings[ds][roomId].push({name:currentUser.name,teamId:currentUser.teamId,userId:currentUser.id,start,end});
  closeModal();
  showToast(`✓ Booket ${room.name} ${start}–${end}`,'success');
  renderCalendar();
}

function removeBooking(ds,roomId,booking){
  const list=bookings[ds]?.[roomId]||[];
  const idx=list.findIndex(b=>b.userId===booking.userId);
  if(idx>=0) list.splice(idx,1);
  showToast('Booking fjernet','info');
  renderCalendar();
}

function getWeekMonday(weeksAgo) {
  const d=new Date(); d.setHours(0,0,0,0);
  const mon=getMonday(d);
  mon.setDate(mon.getDate()-weeksAgo*7);
  return mon;
}

function getVisibleTeamIds() {
  // Drift sees all teams
  const myTeam=teams.find(t=>t.id===currentUser.teamId);
  if(!myTeam) return teams.map(t=>t.id);
  if(myTeam.category==='Drift') return teams.map(t=>t.id);
  // Others see teams in same category
  return teams.filter(t=>t.category===myTeam.category).map(t=>t.id);
}

function populateHistTeamSelect() {
  const sel=document.getElementById('histTeamSel');
  sel.innerHTML='';
  sel.disabled=false;

  if(!currentUser.isLeader) {
    // Regular members: see only themselves → no team selector needed, handled in renderHistory
    const myTeam=teams.find(t=>t.id===currentUser.teamId);
    sel.innerHTML=`<option value="${myTeam.id}">${myTeam.name}</option>`;
    sel.disabled=true;
    return;
  }

  // Leaders: see teams based on category rules
  const visibleIds=getVisibleTeamIds();
  const visibleTeams=teams.filter(t=>visibleIds.includes(t.id));

  // Group by category
  const byCategory={};
  visibleTeams.forEach(t=>{
    if(!byCategory[t.category]) byCategory[t.category]=[];
    byCategory[t.category].push(t);
  });

  Object.entries(byCategory).forEach(([cat,tms])=>{
    const og=document.createElement('optgroup'); og.label=cat;
    tms.forEach(t=>{
      const o=document.createElement('option'); o.value=t.id; o.textContent=t.name; og.appendChild(o);
    });
    sel.appendChild(og);
  });
  sel.value=currentUser.teamId;
}

function getMemberWeekDays(userId, mondayDate) {
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(mondayDate); d.setDate(d.getDate()+i);
    const ds=dateStr(d);
    const dayLabel = d.toLocaleDateString('da-DK',{weekday:'short',day:'numeric',month:'short'});
    // Check no_plads
    const noP=(bookings[ds]?.no_plads||[]).find(b=>b.userId===userId);
    if(noP){
      const note = noP.note ? ` <span style="opacity:.7;font-style:italic">(${noP.note})</span>` : ' <span style="opacity:.6;font-style:italic">(uden plads)</span>';
      days.push(dayLabel+'<span style="opacity:.6"> – ingen plads'+((noP.note)?': '+noP.note:'')+'</span>');
      continue;
    }
    for(const room of ROOMS){
      if((bookings[ds]?.[room.id]||[]).some(b=>b.userId===userId)){
        days.push(dayLabel);
        break;
      }
    }
  }
  return days;
}

// Tooltip positioning via JS to avoid clipping
function attachTooltips() {
  const tooltip = document.getElementById('globalTooltip');
  document.querySelectorAll('.week-cell[data-tip]').forEach(cell => {
    cell.addEventListener('mouseenter', e => {
      tooltip.innerHTML = cell.dataset.tip;
      tooltip.style.display = 'block';
      positionTooltip(e, tooltip);
    });
    cell.addEventListener('mousemove', e => positionTooltip(e, tooltip));
    cell.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
  });
}
function positionTooltip(e, tooltip) {
  const gap = 10;
  let x = e.clientX - tooltip.offsetWidth / 2;
  let y = e.clientY - tooltip.offsetHeight - gap;
  if (y < 8) y = e.clientY + gap + 10;
  if (x < 8) x = 8;
  if (x + tooltip.offsetWidth > window.innerWidth - 8) x = window.innerWidth - tooltip.offsetWidth - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function buildWeeks(periodVal) {
  const todayMon = getMonday(new Date());
  const weeks = [];
  if (periodVal === 'year') {
    const jan1 = new Date(new Date().getFullYear(), 0, 1);
    const firstMon = getMonday(jan1);
    for (let m = new Date(firstMon); m <= todayMon; m.setDate(m.getDate() + 7)) {
      weeks.push({ mon: new Date(m), wn: getWeekNumber(m) });
    }
  } else {
    const n = parseInt(periodVal);
    for (let w = n - 1; w >= 0; w--) {
      const mon = new Date(todayMon); mon.setDate(mon.getDate() - w * 7);
      weeks.push({ mon, wn: getWeekNumber(mon) });
    }
  }
  return weeks;
}

function renderHistory() {
  const teamId = document.getElementById('histTeamSel').value;
  const periodVal = document.getElementById('histPeriod').value;
  const team = teams.find(t => t.id === teamId);
  if (!team) return;
  const col = TEAM_COLORS[team.colorIdx];
  const todayMon = getMonday(new Date());
  const weeks = buildWeeks(periodVal);

  // Determine which members to show
  let membersToShow;
  if (!currentUser.isLeader) {
    // Regular member: only show themselves
    membersToShow = [{ name: currentUser.name, userId: currentUser.id }];
  } else {
    membersToShow = team.members.map(name => ({
      name,
      userId: 'member_' + name.replace(/\s/g, '_').toLowerCase()
    }));
  }

  const memberData = membersToShow.map(({ name, userId }) => {
    let totalDays = 0, pastCount = 0;
    const weekData = weeks.map(({ mon, wn }) => {
      const isPast = mon <= todayMon;
      const days = getMemberWeekDays(userId, mon);
      if (isPast) { totalDays += days.length; pastCount++; }
      return { count: days.length, days, isPast };
    });
    const avg = pastCount > 0 ? totalDays / pastCount : 0;
    return { name, userId, weekData, avg };
  });

  const content = document.getElementById('histContent');
  const isManyWeeks = weeks.length > 16;

  let html = `<table class="hist-table"><thead><tr>
    <th style="position:sticky;left:0;background:var(--navy);z-index:2">Medarbejder</th>
    <th style="white-space:nowrap">Gns./uge</th>`;
  weeks.forEach(({ wn }) => { html += `<th style="text-align:center;min-width:${isManyWeeks?'42px':'52px'}">U${wn}</th>`; });
  html += `</tr></thead><tbody>`;

  memberData.forEach(m => {
    const avgCls = m.avg >= 2 ? 'green' : m.avg >= 1 ? 'yellow' : 'red';
    html += `<tr>
      <td class="member-name-cell" style="position:sticky;left:0;background:#fff;z-index:1">${m.name}
        <span class="team-badge" style="background:${col.bg};color:${col.text}">${team.name}</span>
      </td>
      <td><span class="hist-avg ${avgCls}">${m.avg.toFixed(1)}</span></td>`;
    m.weekData.forEach(wd => {
      if (!wd.isPast) {
        html += `<td><div class="week-cell empty">–</div></td>`;
      } else {
        const cls = wd.count >= 2 ? 'green' : wd.count === 1 ? 'yellow' : 'red';
        const tipHtml = wd.days.length > 0
          ? wd.days.map(d => `• ${d}`).join('<br>')
          : '<i style="opacity:.7">Ingen fremmøde</i>';
        html += `<td><div class="week-cell ${cls}" data-tip="${tipHtml.replace(/"/g,'&quot;')}">${wd.count}</div></td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  html += `<p style="margin-top:12px;font-size:12px;color:var(--text-muted)">
    <span style="background:#d1fae5;color:#065f46;padding:2px 7px;border-radius:4px;font-weight:700;margin-right:6px">≥2</span> Opfylder krav &nbsp;
    <span style="background:#fef9c3;color:#92400e;padding:2px 7px;border-radius:4px;font-weight:700;margin-right:6px">1</span> Under krav &nbsp;
    <span style="background:#fee2e2;color:#991b1b;padding:2px 7px;border-radius:4px;font-weight:700;margin-right:6px">0</span> Ikke mødt op
  </p>`;

  content.innerHTML = html;
  attachTooltips();
}

function seedDemoBookings() {
  const today=new Date(); today.setHours(0,0,0,0);
  const allMembers=[];
  teams.forEach(t=>t.members.forEach(m=>allMembers.push({name:m,teamId:t.id,userId:'member_'+m.replace(/\s/g,'_').toLowerCase()})));
  const shiftOptions=[['07:00','15:00'],['08:00','16:00'],['08:00','16:00'],['08:00','16:00'],['09:00','17:00'],['10:00','18:00'],['12:00','20:00']];

  // Seed 10 weeks back + 2 weeks forward
  for(let dayOffset=-70;dayOffset<14;dayOffset++){
    const d=new Date(today); d.setDate(d.getDate()+dayOffset);
    const di=d.getDay(); if(di===0||di===6) continue;
    const ds=dateStr(d);
    if(!bookings[ds]) bookings[ds]={};
    ROOMS.forEach(room=>{ if(!bookings[ds][room.id]) bookings[ds][room.id]=[]; });
    const isWknd=(d.getDay()===0||d.getDay()===6);
    const shuffled=[...allMembers].sort(()=>Math.random()-.5);
    const pickCount=isWknd?Math.floor(Math.random()*6)+2:Math.floor(Math.random()*15)+5;
    shuffled.slice(0,Math.min(pickCount,shuffled.length)).forEach(m=>{
      const room=ROOMS[Math.floor(Math.random()*ROOMS.length)];
      if((bookings[ds][room.id]?.length||0)<Math.floor(room.capacity*0.7)){
        const isWkndDay=(d.getDay()===0||d.getDay()===6);
        const wkndShifts=[['10:00','17:00'],['10:00','17:00'],['11:00','18:00']];
        const shift=isWkndDay
          ?wkndShifts[Math.floor(Math.random()*wkndShifts.length)]
          :shiftOptions[Math.floor(Math.random()*shiftOptions.length)];
        bookings[ds][room.id].push({name:m.name,teamId:m.teamId,userId:m.userId,start:shift[0],end:shift[1]});
      }
    });
  }
}

// lunchBookings[ds][section][slotId] = [userId, userId, ...]


// lunchBookings[weekKey][section][slotIdx][userId] = true
// weekKey = "YYYY-Www"
let lunchBookings = {};
// Per-day slot/capacity overrides set by Drift (auto-expires when date changes)
let lunchDayOverride = {};

function getDaySlots(section, ds) {
  const today = new Date(); today.setHours(0,0,0,0);
  const isWeekend = parseDate(ds).getDay()===0 || parseDate(ds).getDay()===6;
  if(lunchDayOverride[ds]?.[section]?.slots) return lunchDayOverride[ds][section].slots;
  if(section==='ks') return lunchConfig.ks.slots;
  return isWeekend ? lunchConfig.ts.weekendSlots : lunchConfig.ts.weekdaySlots;
}

function getDayCapacity(section, slot, ds) {
  if(lunchDayOverride[ds]?.[section]?.capacity?.[slot] !== undefined)
    return lunchDayOverride[ds][section].capacity[slot];
  return getLunchCapacity(section, slot);
}

function initDayOverride(section, ds) {
  if(!lunchDayOverride[ds]) lunchDayOverride[ds] = {};
  if(!lunchDayOverride[ds][section]) {
    const isWeekend = parseDate(ds).getDay()===0 || parseDate(ds).getDay()===6;
    const slots = section==='ks' ? [...lunchConfig.ks.slots]
      : isWeekend ? [...lunchConfig.ts.weekendSlots] : [...lunchConfig.ts.weekdaySlots];
    const capacity = {};
    slots.forEach(s => { capacity[s] = getLunchCapacity(section, s); });
    lunchDayOverride[ds][section] = { slots, capacity };
  }
}

function lunchWeekKey(monday) {
  return `${monday.getFullYear()}-W${String(getWeekNumber(monday)).padStart(2,'0')}`;
}

// KS skill assignment per member (demo)
const KS_SKILLS = {};

function getMemberSkills(uid) {
  // Returns array of skills for a KS member
  const s = KS_SKILLS[uid];
  if(!s) return [];

}

function setMemberSkills(uid, skillsArr) {
  KS_SKILLS[uid] = skillsArr;
}

function getLunchSection(userId) {
  // Returns 'ks', 'ts', or null
  const team = teams.find(t => {
    return t.members.some(m=>'member_'+m.replace(/\s/g,'_').toLowerCase()===userId)
        || t.leaders.includes(userId);
  });
  if(!team) return null;
  if(team.category==='Kundeservice') return 'ks';
  if(team.category==='Teknisk Support') return 'ts';
  return null;
}

function lunchSlotKey(slot) { return slot.replace(/[:-]/g,''); }

function toggleLunchBooking(ds, section, slotId, slot) {
  // slot parameter is the time string (e.g. "11:30-12:00"), slotId is the key
  const userId = currentUser.id;
  if(!lunchBookings[ds]) lunchBookings[ds]={};
  if(!lunchBookings[ds][section]) lunchBookings[ds][section]={};
  if(!lunchBookings[ds][section][slotId]) lunchBookings[ds][section][slotId]=[];
  const arr = lunchBookings[ds][section][slotId];
  const existing = Array.isArray(arr) ? arr.includes(userId) : arr[userId];
  if(existing) {
    if(Array.isArray(arr)) {
      lunchBookings[ds][section][slotId] = arr.filter(u=>u!==userId);
    } else {
      delete lunchBookings[ds][section][slotId][userId];
    }
    spDeleteLunchBooking(ds, section, slotId, userId); // async
    showToast('Frokostbooking fjernet','info');
  } else {
    // Check not already booked in another slot today for this section
    const alreadyBooked = Object.entries(lunchBookings[ds][section]||{})
      .filter(([k])=>!k.startsWith('_'))
      .some(([k,v])=>k!==slotId && (Array.isArray(v)?v.includes(userId):v[userId]));
    if(alreadyBooked) { showToast('Du er allerede tilmeldt et frokosttidspunkt i dag','error'); return; }
    if(Array.isArray(arr)) arr.push(userId);
    else lunchBookings[ds][section][slotId] = [userId];
    spSaveLunchBooking(ds, section, slotId, userId); // async
    showToast('Frokost booket ✓','success');
  }
  renderLunch();
}

let lunchWeekOffset = 0;

function lunchChangeWeek(delta) {
  lunchWeekOffset += delta;
  renderLunch();
}

function getLunchCapacity(section, slot) {
  const cap = lunchConfig[section]?.capacity?.[slot];
  return (cap !== undefined && cap > 0) ? cap : 3;
}

function getLunchBookings(ds, section, slotId) {
  // Returns array of userIds booked in this slot
  const val = lunchBookings[ds]?.[section]?.[slotId];
  if(!val) return [];
  if(Array.isArray(val)) return val;
  // legacy object format: convert
  return Object.keys(val);
}

function toggleLunchBooking(ds, section, slotId, slot) {
  const userId = currentUser.id;
  if(!lunchBookings[ds]) lunchBookings[ds]={};
  if(!lunchBookings[ds][section]) lunchBookings[ds][section]={};
  const arr = getLunchBookings(ds, section, slotId);

  if(arr.includes(userId)) {
    // Remove booking
    lunchBookings[ds][section][slotId] = arr.filter(u=>u!==userId);
    showToast('Frokostbooking fjernet','info');
  } else {
    // Check already booked in another slot today
    const alreadyElsewhere = Object.entries(lunchBookings[ds][section]||{})
      .some(([k,v])=>k!==slotId && Array.isArray(v) && v.includes(userId));
    if(alreadyElsewhere){ showToast('Du er allerede tilmeldt et tidspunkt i dag','error'); return; }
    // Check capacity
    const cap = getDayCapacity(section, slot, ds);
    if(arr.length >= cap){ showToast('Tidspunktet er fuldt','error'); return; }
    lunchBookings[ds][section][slotId] = [...arr, userId];
    showToast('Frokost booket ✓','success');
  }
  renderLunch();
}

function resetDayToDefault(section, ds) {
  // Delete day override so getDaySlots/getDayCapacity fall back to lunchConfig defaults
  if(lunchDayOverride[ds]) {
    delete lunchDayOverride[ds][section];
    if(Object.keys(lunchDayOverride[ds]).length === 0) delete lunchDayOverride[ds];
  }
  // Also clear bookings for slots that no longer exist in default config
  if(lunchBookings[ds]?.[section]) {
    const isWeekend = parseDate(ds).getDay()===0 || parseDate(ds).getDay()===6;
    const defaultSlots = section==='ks' ? lunchConfig.ks.slots
      : isWeekend ? lunchConfig.ts.weekendSlots : lunchConfig.ts.weekdaySlots;
    Object.keys(lunchBookings[ds][section]).forEach(k => {
      const stillValid = defaultSlots.some(s => k.endsWith(lunchSlotKey(s)) || k.includes(lunchSlotKey(s)));
      if(!stillValid) delete lunchBookings[ds][section][k];
    });
  }
  showToast('Nulstillet til standardindstillinger', 'success');
  renderLunch();
}

function adjustLunchCap(section, slot, ds, delta) {
  initDayOverride(section, ds);
  const ov = lunchDayOverride[ds][section];
  const cur = ov.capacity[slot] ?? getLunchCapacity(section, slot);
  ov.capacity[slot] = Math.max(1, cur + delta);
  spSaveLunchConfig(ds, section, ov); // async
  renderLunch();
}

function adjustSkillCap(skill, slot, ds, delta) {
  initDayOverride('ks', ds);
  const ov = lunchDayOverride[ds]['ks'];
  if(!ov.skillCap) ov.skillCap = {};
  if(!ov.skillCap[skill]) ov.skillCap[skill] = {};
  const base = ov.skillCap[skill][slot] ?? getDayCapacity('ks', slot, ds);
  ov.skillCap[skill][slot] = Math.max(1, base + delta);
  spSaveLunchConfig(ds, 'ks', ov); // async
  renderLunch();
}

function getSkillCap(skill, slot, ds) {
  const skillCap = lunchDayOverride[ds]?.ks?.skillCap?.[skill]?.[slot];
  if(skillCap !== undefined) return skillCap;
  return getDayCapacity('ks', slot, ds);
}

function addLunchSlot(section, ds) {
  const val = prompt('Nyt tidsrum (HH:MM-HH:MM):');
  if(!val) return;
  if(!/^\d{2}:\d{2}-\d{2}:\d{2}$/.test(val.trim())) { showToast('Format skal være HH:MM-HH:MM','error'); return; }
  const slot = val.trim();
  initDayOverride(section, ds);
  const ov = lunchDayOverride[ds][section];
  if(ov.slots.includes(slot)) { showToast('Tidsrummet findes allerede','error'); return; }
  ov.slots.push(slot); ov.slots.sort();
  ov.capacity[slot] = 3;
  renderLunch();
}

function removeLunchSlot(section, slot, ds, confirmed) {
  initDayOverride(section, ds);
  const ov = lunchDayOverride[ds][section];
  // Check for existing bookings
  const hasBookings = (function(){
    if(!lunchBookings[ds]?.[section]) return false;
    return Object.entries(lunchBookings[ds][section]).some(([k,v]) => {
      const keySlot = section==='ks'
        ? k.split('_').slice(1,-1).join('-').replace(/(\d{4})(\d{4})/,'$1-$2') // approximate check
        : true;
      // simpler: check if key ends with the slot key
      return k.endsWith(lunchSlotKey(slot)) && Array.isArray(v) && v.length>0;
    });
  })();

  if(!confirmed) {
    const msg = hasBookings
      ? 'Advarsel: der er allerede medarbejdere booket i dette tidsrum.\n\nEr du sikker på at du vil fjerne "'+slot+'" og slette deres bookinger?'
      : 'Fjern tidsrummet "'+slot+'"?';
    if(!confirm(msg)) return;
  }

  ov.slots = ov.slots.filter(s=>s!==slot);
  delete ov.capacity[slot];
  // Delete bookings for this slot
  if(lunchBookings[ds]?.[section]) {
    Object.keys(lunchBookings[ds][section]).forEach(k => {
      if(k.endsWith(lunchSlotKey(slot))) delete lunchBookings[ds][section][k];
    });
  }
  renderLunch();
}

      const lbl = document.createElement('span'); lbl.style.cssText='flex:1;font-weight:600;font-size:13px'; lbl.textContent=val;
      const cl = document.createElement('span'); cl.style.cssText='font-size:12px;color:#666'; cl.textContent='Pladser:';
      const m2 = document.createElement('button'); m2.textContent='−'; m2.style.cssText=addBtn.style.cssText.replace('#0073b6','var(--surface)').replace('color:#fff','color:var(--text)').replace('font-weight:700',''); m2.style.border='1.5px solid var(--border)'; m2.style.width='28px'; m2.style.height='28px';
      const cn = document.createElement('span'); cn.style.cssText='font-weight:800;font-size:15px;min-width:24px;text-align:center'; cn.textContent='3'; cn.dataset.cap='3';
      const p2 = document.createElement('button'); p2.textContent='+'; p2.style.cssText=m2.style.cssText;
      m2.onclick=()=>{let v=parseInt(cn.dataset.cap);if(v>1){v--;cn.dataset.cap=v;cn.textContent=v;}};
      p2.onclick=()=>{let v=parseInt(cn.dataset.cap);if(v<20){v++;cn.dataset.cap=v;cn.textContent=v;}};
      const db = document.createElement('button'); db.textContent='🗑'; db.style.cssText='border:none;background:none;cursor:pointer;font-size:14px;opacity:.5;padding:2px 4px'; db.onclick=()=>newRow.remove();
      newRow.appendChild(lbl); newRow.appendChild(cl); newRow.appendChild(m2); newRow.appendChild(cn); newRow.appendChild(p2); newRow.appendChild(db);
      rows.appendChild(newRow);
      inp.value='';
    };
    addRow.appendChild(inp); addRow.appendChild(addBtn);
    sec.appendChild(addRow);
    return {sec, rows};
  }

  const title = document.createElement('h3');
  title.style.cssText = 'margin:0 0 20px;font-size:18px';
  title.textContent = '⚙ Tilpas frokosttidspunkter & pladser';
  box.appendChild(title);

  const {sec:ksEl, rows:ksRows} = buildSection('☕ Kundeservice', 'ks', lunchConfig.ks.slots, lunchConfig.ks.capacity, 'slots');
  const {sec:tsWDEl, rows:tsWDRows} = buildSection('🖥️ Teknisk Support – Hverdage', 'ts', lunchConfig.ts.weekdaySlots, lunchConfig.ts.capacity, 'weekdaySlots');
  const {sec:tsWEEl, rows:tsWERows} = buildSection('🖥️ Teknisk Support – Weekend', 'ts', lunchConfig.ts.weekendSlots, lunchConfig.ts.capacity, 'weekendSlots');
  box.appendChild(ksEl); box.appendChild(tsWDEl); box.appendChild(tsWEEl);

  function readRows(rowsEl) {
    const slots = [];
    const caps = {};
    rowsEl.querySelectorAll('[data-slot]').forEach(r => {
      const slot = r.dataset.slot;
      const capEl = r.querySelector('[data-cap]');
      if(slot && capEl) { slots.push(slot); caps[slot] = parseInt(capEl.dataset.cap); }
    });
    return {slots, caps};
  }

  const btns = document.createElement('div');
  btns.style.cssText = 'display:flex;gap:10px;justify-content:flex-end;margin-top:12px';
  const cancel = document.createElement('button');
  cancel.textContent = 'Annuller';
  cancel.style.cssText = 'padding:9px 20px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);font-family:inherit;font-size:14px;cursor:pointer';
  cancel.onclick = () => overlay.remove();
  const save = document.createElement('button');
  save.textContent = 'Gem';
  save.style.cssText = 'padding:9px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer';
  save.onclick = () => {
    const ks = readRows(ksRows);
    const tsWD = readRows(tsWDRows);
    const tsWE = readRows(tsWERows);
    lunchConfig.ks.slots = ks.slots;
    Object.assign(lunchConfig.ks.capacity, ks.caps);
    lunchConfig.ts.weekdaySlots = tsWD.slots;
    lunchConfig.ts.weekendSlots = tsWE.slots;
    Object.assign(lunchConfig.ts.capacity, tsWD.caps, tsWE.caps);
    overlay.remove();
    showToast('Frokostindstillinger gemt ✓','success');
    renderLunch();
  };
  btns.appendChild(cancel); btns.appendChild(save);
  box.appendChild(btns);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}


</script>
</body>
</html>
